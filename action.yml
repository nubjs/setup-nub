name: "Setup nub"
description: "Drop-in setup-node replacement: install the nub CLI, optionally pre-provision Node and cache nub's store."
author: "nubjs"

branding:
  icon: "package"
  color: "purple"

inputs:
  nub-version:
    description: "Version of nub to install — any semver range npm understands (0.0.47, ^0.1.0, latest). Default: latest."
    required: false
    default: "latest"
  version:
    description: "DEPRECATED alias for nub-version (kept for one minor; emits a warning). Use nub-version."
    required: false
    default: ""
  node-version:
    description: "Pre-provision this Node version into nub's cache so the first run is warm. A warm-up HINT, not a pin — nub still runs the project's declared Node at runtime. Default: nub resolves and provisions the project pin lazily on first use."
    required: false
  node-version-file:
    description: "Read a Node version from this file (.node-version, .nvmrc, package.json) and pre-provision it. Redundant with nub's own resolution; an explicit warm-up alternative to node-version."
    required: false
  cache:
    description: "Cache nub's global store and provisioned Node toolchains across runs. A boolean (true/false); for setup-node drop-in compatibility a PM name (npm/yarn/pnpm/bun) is also accepted and treated as truthy. Leave UNSET to auto-enable when a lockfile or a package.json packageManager/devEngines field is present (mirrors setup-node). Set false to disable."
    required: false
    default: ""
  package-manager-cache:
    description: "Set to false to disable automatic caching. By default (true), caching is enabled when a lockfile or a package.json packageManager/devEngines field is present. Mirrors setup-node's input of the same name. An explicit cache value still wins."
    required: false
    default: "true"
  cache-dependency-path:
    description: "Lockfile path(s) whose hash keys the cache. Supports globs / newline-delimited lists. Default: auto-detect the project's lockfile."
    required: false
  cache-key-prefix:
    description: "Prefix injected into the cache key (nub-<os>-<arch>-<prefix>-<hash>), letting you scope or bust caches independently of the lockfile. Default: none."
    required: false
  working-directory:
    description: "Directory to resolve the project's Node pin and lockfile from. Default: the checkout root. Use for monorepos where package.json/.node-version live in a subdirectory."
    required: false
  registry-url:
    description: "Registry to set up for auth. Writes a temporary user-level .npmrc (via NPM_CONFIG_USERCONFIG; the neutral file nub's PM reads) and wires auth to env.NODE_AUTH_TOKEN."
    required: false
  scope:
    description: "Scope for a scoped registry. Falls back to the repository owner for GitHub Packages (npm.pkg.github.com)."
    required: false
  always-auth:
    description: "Write always-auth=true into the temporary user-level .npmrc."
    required: false
    default: "false"
  token:
    description: "Token for GitHub-API rate-limit relief when resolving nub's version range (and Node downloads on GHES). Defaults to github.token on github.com."
    required: false
    default: ${{ github.server_url == 'https://github.com' && github.token || '' }}
  # Accepted-and-ignored for setup-node drop-in compatibility (never errors on a recognized input).
  check-latest:
    description: "Accepted for setup-node compatibility; ignored. nub's resolver already resolves the latest matching version on first run."
    required: false
  architecture:
    description: "Accepted for setup-node compatibility; ignored. nub selects the runner's native architecture automatically."
    required: false
  mirror:
    description: "Accepted for setup-node compatibility; ignored in v1."
    required: false
  mirror-token:
    description: "Accepted for setup-node compatibility; ignored in v1."
    required: false

outputs:
  nub-version:
    description: "The installed nub version (nub --version, a bare v<semver>)."
    value: ${{ steps.install.outputs.nub-version }}
  node-version:
    description: "The Node version nub resolves for the project (nub node which). Empty when nothing was provisioned."
    value: ${{ steps.provision.outputs.node-version }}
  cache-hit:
    description: "Whether an exact nub-store cache match was restored. 'true' on an exact key hit, 'false' on a restore-keys partial hit, empty on a full miss (e.g. the first run) — mirrors actions/cache. Use caching-enabled to tell whether caching is active."
    value: ${{ steps.cache.outputs.cache-hit }}
  caching-enabled:
    description: "Whether caching is active for this run ('true'/'false'). Reflects the resolved cache/package-manager-cache/auto-detect decision, independent of whether a cache was hit."
    value: ${{ steps.cacheflag.outputs.enabled }}

runs:
  using: "composite"
  steps:
    # 1. Install nub globally via npm (preinstalled on every GitHub-hosted runner).
    #    npm pulls the os/cpu-filtered @nubjs/nub-<platform> optional dep and links
    #    the nub/nubx bins onto PATH; postinstall sets the execute bit.
    - name: Install nub
      id: install
      shell: bash
      env:
        NUB_VERSION: ${{ inputs.nub-version }}
        VERSION_ALIAS: ${{ inputs.version }}
      run: |
        set -euo pipefail
        spec="$NUB_VERSION"
        # `version` is a deprecated alias for `nub-version`. If the caller set it
        # (to anything other than the default empty) and left nub-version at its
        # default, honor it and warn.
        if [ -n "$VERSION_ALIAS" ]; then
          echo "::warning::The 'version' input is deprecated; use 'nub-version' instead."
          if [ "$spec" = "latest" ]; then
            spec="$VERSION_ALIAS"
          fi
        fi
        npm install -g "@nubjs/nub@${spec}"
        # nub --version prints a bare v<semver> on stdout; the resolved Node rides
        # on stderr, so 2>/dev/null keeps the captured value a clean version string.
        installed="$(nub --version 2>/dev/null)"
        echo "Installed nub ${installed}"
        echo "nub-version=${installed}" >> "$GITHUB_OUTPUT"

    # 1b. Decide whether caching is active, mirroring setup-node's model:
    #     caching is ON BY DEFAULT and auto-enables when the project looks
    #     installable (a lockfile, or a package.json packageManager/devEngines
    #     field). The `cache` input is an explicit override; `package-manager-cache:
    #     false` is the disable knob. Precedence:
    #       1. explicit `cache` value  -> wins (false disables; any other value
    #          enables; a PM name like `npm`/`pnpm` is accepted for setup-node
    #          drop-in compat and treated as truthy — nub has one store regardless).
    #       2. `package-manager-cache: false` -> disables.
    #       3. otherwise -> AUTO: enable iff a lockfile or a
    #          packageManager/devEngines signal is present.
    - name: Resolve caching state
      id: cacheflag
      shell: bash
      env:
        CACHE_IN: ${{ inputs.cache }}
        PMC_IN: ${{ inputs.package-manager-cache }}
        WORKDIR: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        raw="$CACHE_IN"
        lc="$(echo "$raw" | tr '[:upper:]' '[:lower:]')"
        pmc="$(echo "${PMC_IN:-true}" | tr '[:upper:]' '[:lower:]')"
        dir="${WORKDIR:-.}"

        if [ -n "$lc" ]; then
          # 1. explicit `cache` value wins.
          case "$lc" in
            false|"0"|no|off) enabled=false ;;
            *)                enabled=true  ;;
          esac
          case "$lc" in
            npm|yarn|pnpm|bun)
              echo "::notice::setup-nub's \`cache\` is a boolean (nub has one store regardless of package manager); the value \"${raw}\" enables caching." ;;
          esac
        elif [ "$pmc" = "false" ] || [ "$pmc" = "0" ] || [ "$pmc" = "no" ] || [ "$pmc" = "off" ]; then
          # 2. caching explicitly disabled.
          enabled=false
        else
          # 3. AUTO (mirrors setup-node default-on): enable when the project looks
          #    installable. A lockfile is the strongest signal; otherwise a
          #    package.json that declares a packageManager or devEngines also opts
          #    in (setup-node enables when packageManager/devEngines is present).
          enabled=false
          for f in pnpm-lock.yaml package-lock.json bun.lock bun.lockb yarn.lock; do
            [ -f "$dir/$f" ] && enabled=true && break
          done
          if [ "$enabled" = "false" ] && [ -f "$dir/package.json" ]; then
            # require() treats a bare path as a module lookup, so pass an absolute
            # path to read the package.json reliably for any working-directory.
            pj="$(cd "$dir" && pwd)/package.json"
            if node -e "const p=require(process.argv[1]);process.exit((p.packageManager||p.devEngines)?0:1)" "$pj" 2>/dev/null; then
              enabled=true
            fi
          fi
          [ "$enabled" = "true" ] && echo "Caching auto-enabled (lockfile or packageManager/devEngines present). Disable with package-manager-cache: false."
        fi
        echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

    # 2. Resolve the cache paths from nub itself (never hardcode XDG layout).
    #    `nub store path` prints the resolved CAS store dir on stdout. The Node
    #    toolchain dir is <cache>/node; derive <cache> from XDG with the ~/.cache
    #    fallback that nub uses. The PM packument cache is best-effort (small +
    #    re-fetchable; a wrong path is a cheap miss, not breakage).
    - name: Resolve cache paths
      id: cachepaths
      if: steps.cacheflag.outputs.enabled == 'true'
      shell: bash
      run: |
        set -euo pipefail
        store="$(nub store path 2>/dev/null)"
        cache_root="${XDG_CACHE_HOME:-$HOME/.cache}/nub"
        {
          echo "store=$store"
          echo "node-cache=$cache_root/node"
          echo "pm-cache=$cache_root/pm"
        } >> "$GITHUB_OUTPUT"

    # 3. Compute the cache key from the lockfile (cache-dependency-path overrides
    #    the auto-detected lockfile glob). The lockfile glob is resolved relative
    #    to working-directory so monorepo subdirs are detected; cache-dependency-path
    #    is honored verbatim (it may already be a repo-relative path / glob).
    - name: Compute cache key
      id: cachekey
      if: steps.cacheflag.outputs.enabled == 'true'
      shell: bash
      env:
        DEP_PATH: ${{ inputs.cache-dependency-path }}
        WORKDIR: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        dir="${WORKDIR:-.}"
        prefix=""
        [ "$dir" != "." ] && prefix="${dir%/}/"
        if [ -n "$DEP_PATH" ]; then
          dep_glob="$DEP_PATH"
        else
          # auto-detect: first present lockfile (pnpm > npm > bun > yarn) under
          # the working directory. Emit a workspace-relative path so hashFiles()
          # resolves it (hashFiles is rooted at GITHUB_WORKSPACE).
          dep_glob=""
          for f in pnpm-lock.yaml package-lock.json bun.lock bun.lockb yarn.lock; do
            [ -f "$dir/$f" ] && dep_glob="${prefix}${f}" && break
          done
          dep_glob="${dep_glob:-${prefix}package.json}"
        fi
        echo "dep-glob=$dep_glob" >> "$GITHUB_OUTPUT"

        # Fold the project's Node pin into the cache key so a Node-version bump
        # invalidates the toolchain cache (setup-node#1171). We hash the pin SOURCE
        # files rather than the installed version (provision runs later); any pin
        # change busts the key, identical pins reuse it. Emitted as a newline-
        # delimited glob list for hashFiles() (multiline GITHUB_OUTPUT value).
        {
          echo "pin-glob<<PINEOF"
          for f in .node-version .nvmrc; do
            [ -f "$dir/$f" ] && echo "${prefix}${f}"
          done
          echo "PINEOF"
        } >> "$GITHUB_OUTPUT"

    # 4. Restore/save nub's store + Node toolchains. The restore-keys ladder gives
    #    a partial warm hit even on a fresh lockfile (huge over cold).
    - name: Cache nub store
      id: cache
      if: steps.cacheflag.outputs.enabled == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.cachepaths.outputs.store }}
          ${{ steps.cachepaths.outputs.node-cache }}
          ${{ steps.cachepaths.outputs.pm-cache }}
        key: nub-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache-key-prefix }}-${{ hashFiles(steps.cachekey.outputs.pin-glob) }}-${{ hashFiles(steps.cachekey.outputs.dep-glob) }}
        restore-keys: |
          nub-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache-key-prefix }}-${{ hashFiles(steps.cachekey.outputs.pin-glob) }}-
          nub-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache-key-prefix }}-

    # 5. Write a NEUTRAL project .npmrc for registry auth — byte-for-byte the
    #    setup-node authutil contract (registry, <scope>:registry, _authToken
    #    bound to NODE_AUTH_TOKEN, optional always-auth), then point npm config
    #    at it via NPM_CONFIG_USERCONFIG. nub's PM reads this standard file.
    - name: Configure registry auth
      if: inputs.registry-url != ''
      shell: bash
      env:
        REGISTRY_URL: ${{ inputs.registry-url }}
        SCOPE: ${{ inputs.scope }}
        ALWAYS_AUTH: ${{ inputs.always-auth }}
        OWNER: ${{ github.repository_owner }}
      run: |
        set -euo pipefail
        npmrc="${RUNNER_TEMP}/.npmrc"
        # normalize the registry URL to a trailing slash (authutil.ts:12-14).
        url="${REGISTRY_URL%/}/"
        scope="$SCOPE"
        # GitHub Packages: default the scope to the repo owner (authutil.ts:21-23).
        host_only="${url#*://}"; host_only="${host_only%%/*}"
        if [ -z "$scope" ] && [ "$host_only" = "npm.pkg.github.com" ]; then
          scope="$OWNER"
        fi
        # Normalize the scope exactly like setup-node (authutil.ts:24-29):
        # prepend a leading @ if missing, then lowercase the WHOLE scope.
        if [ -n "$scope" ]; then
          case "$scope" in
            @*) ;;
            *) scope="@${scope}" ;;
          esac
          scope="$(echo "$scope" | tr '[:upper:]' '[:lower:]')"
        fi
        # The auth-token line prefix strips ONLY the scheme and keeps the full
        # path (authutil.ts:43-44: registryUrl.replace(/(^\w+:|^)/, '')), so a
        # path-bearing private registry keeps its path in the //host/path/ key.
        auth_prefix="${url#*://}"
        {
          if [ -n "$scope" ]; then
            echo "${scope}:registry=${url}"
          else
            echo "registry=${url}"
          fi
          echo "//${auth_prefix}:_authToken=\${NODE_AUTH_TOKEN}"
          [ "$ALWAYS_AUTH" = "true" ] && echo "always-auth=true"
        } > "$npmrc"
        echo "NPM_CONFIG_USERCONFIG=${npmrc}" >> "$GITHUB_ENV"
        echo "Wrote registry auth to ${npmrc}"

    # 6. Eagerly provision the project's Node so later steps are WARM. This runs
    #    UNCONDITIONALLY — the common (no-input) case is the whole point: a bare
    #    `nub node install` resolves the full pin chain (devEngines.runtime ->
    #    .node-version -> .nvmrc -> engines.node), resolves ranges against the
    #    live Node index, and installs the concrete version up front, instead of
    #    nub downloading it lazily mid-build. An explicit node-version /
    #    node-version-file still wins as a warm-up override. A "no pin" project
    #    is fine (skip gracefully); any other failure is a warning, not a fail —
    #    nub provisions lazily at runtime as a fallback. The resolved pin is
    #    emitted as the node-version output.
    #
    #    NOTE: this reads the project's pin files off disk, so actions/checkout
    #    MUST run before setup-nub.
    - name: Provision Node
      id: provision
      shell: bash
      env:
        NODE_VERSION: ${{ inputs.node-version }}
        NODE_VERSION_FILE: ${{ inputs.node-version-file }}
        WORKDIR: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        # Resolve the project pin from working-directory (monorepo subdir support).
        # nub reads pin files from cwd, so cd there before provisioning.
        if [ -n "${WORKDIR:-}" ]; then
          if [ -d "$WORKDIR" ]; then
            cd "$WORKDIR"
          else
            echo "::warning::working-directory '${WORKDIR}' does not exist; resolving the Node pin from the checkout root instead."
          fi
        fi

        # Soft checkout-first hint: with no pin files on disk, the repo probably
        # wasn't checked out yet. Don't fail — just nudge.
        if [ ! -e package.json ] && [ ! -e .node-version ] && [ ! -e .nvmrc ]; then
          echo "::warning::No package.json / .node-version / .nvmrc found in the working directory — did actions/checkout run before setup-nub? Eager Node provisioning needs the project's pin files on disk."
        fi

        want="$NODE_VERSION"
        if [ -z "$want" ] && [ -n "$NODE_VERSION_FILE" ] && [ -f "$NODE_VERSION_FILE" ]; then
          case "$NODE_VERSION_FILE" in
            # Prefer devEngines.runtime.version (nub's primary signal), then fall
            # back to engines.node — never just engines.node.
            *.json) want="$(node -p "try{const p=require('./'+process.argv[1]);const r=p.devEngines&&p.devEngines.runtime;(r&&r.version)||(p.engines&&p.engines.node)||''}catch(e){''}" "$NODE_VERSION_FILE" 2>/dev/null || true)" ;;
            *)      want="$(head -n1 "$NODE_VERSION_FILE" | tr -d 'v[:space:]')" ;;
          esac
        fi

        if [ -n "$want" ]; then
          # Explicit warm-up override.
          echo "Provisioning Node ${want} into nub's cache"
          nub node install "$want" || echo "::warning::nub node install ${want} failed; nub will provision lazily at runtime"
        else
          # Common case: resolve + install the project's own pin chain. A bare
          # `nub node install` exits non-zero with a "no Node pin" message when
          # the project declares no pin — that is expected, skip gracefully.
          echo "Eagerly provisioning the project's pinned Node"
          out=""
          rc=0
          out="$(nub node install 2>&1)" || rc=$?
          [ -n "$out" ] && echo "$out"
          if [ "$rc" -ne 0 ]; then
            if printf '%s' "$out" | grep -qi 'no Node pin'; then
              echo "No Node pin declared by this project; skipping eager provision (nub provisions lazily at runtime)."
            else
              echo "::warning::eager Node provision failed (exit ${rc}); nub will provision lazily at runtime"
            fi
          fi
        fi

        # The authoritative project pin nub will actually run (path on stdout; we
        # read the version dir name after node/).
        resolved="$(nub node which 2>/dev/null || true)"
        # Normalize Windows backslash paths so the forward-slash extraction below
        # works on every OS (no-op on POSIX paths).
        resolved="${resolved//\\//}"
        # <cache>/node/<version>/... — the dir component after node/ is the version.
        ver="$(echo "$resolved" | sed -n 's#.*/node/\([^/]*\)/.*#\1#p')"
        if [ -n "$want" ] && [ -n "$ver" ] && [ "$ver" != "$want" ]; then
          echo "::warning::node-version input (${want}) differs from the project's resolved pin (${ver}); nub runs the project pin."
        fi
        echo "node-version=${ver}" >> "$GITHUB_OUTPUT"
